# Kubernetes Secrets Template
# DO NOT commit this file with actual secrets!
# 
# Usage:
# 1. Copy this file to secrets.yaml
# 2. Replace the placeholder values with actual base64-encoded secrets
# 3. Apply: kubectl apply -f secrets.yaml
# 4. Add secrets.yaml to .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: hr-agent-secrets
type: Opaque
data:
  # Base64 encoded database host
  # Example: echo -n "your-db-host" | base64
  db-host: WU9VUl9EQl9IT1NU  # Replace with actual base64-encoded DB host
  
  # Base64 encoded database password
  # Example: echo -n "your-secure-password" | base64
  db-password: WU9VUl9EQl9QQVNTV09SRA==  # Replace with actual base64-encoded DB password
  
  # Base64 encoded database user
  # Example: echo -n "postgres" | base64
  db-user: cG9zdGdyZXM=  # Replace with actual base64-encoded DB user

---
apiVersion: v1
kind: Secret
metadata:
  name: google-credentials
type: Opaque
data:
  # Base64 encoded Google Cloud service account JSON key
  # Example: cat service-account-key.json | base64 -w 0
  google-credentials.json: eyJrZXkiOiJ2YWx1ZSJ9  # Replace with actual base64-encoded JSON key

---
# Commands to create secrets from files (alternative to YAML):
#
# Create database secrets:
# kubectl create secret generic hr-agent-secrets \
#   --from-literal=db-host="your-db-host" \
#   --from-literal=db-password="your-secure-password" \
#   --from-literal=db-user="postgres"
#
# Create Google credentials secret:
# kubectl create secret generic google-credentials \
#   --from-file=google-credentials.json=path/to/your/service-account-key.json 