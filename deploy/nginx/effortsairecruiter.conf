# effortsairecruiter.tech — reverse proxy to SmartHR app on 127.0.0.1:8081
# Apex + www. HTTP only on first install; certbot --nginx upgrades to :443.

server {
    listen 80;
    listen [::]:80;
    server_name effortsairecruiter.tech www.effortsairecruiter.tech;

    client_max_body_size 50M;

    # Internal-only endpoint (matches smarthr vhost convention)
    location = /api/process-hr-scorecard-task {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
