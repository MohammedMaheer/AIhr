# SmartHR VPS — host nginx vhost (reverse proxy to 127.0.0.1:8081)
# Coexists with /etc/nginx/sites-enabled/leadflow (different server_name).
#
# Hostnames:
#   smarthr-187-127-162-233.nip.io  (free wildcard DNS — no registration)
# After bootstrap, run certbot to upgrade :80 -> :443 TLS:
#   certbot --nginx -d smarthr-187-127-162-233.nip.io

# ---------------------------------------------------------------------------
# Public HTTP vhost (will be auto-upgraded to HTTPS by certbot --nginx)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name smarthr-187-127-162-233.nip.io;

    client_max_body_size 50M;

    location = /api/process-hr-scorecard-task {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ---------------------------------------------------------------------------
# IP-based fallback on :8443 (no TLS) — useful for testing before DNS resolves
# ---------------------------------------------------------------------------
server {
    listen 8443;
    listen [::]:8443;
    server_name _;

    client_max_body_size 50M;

    location = /api/process-hr-scorecard-task {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
